name: Apply Academy Content V18

on:
  push:
    paths:
      - '.github/workflows/apply-v18-content.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academy-content-update
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply v18 content
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          p = Path('academy_content.json')
          data = json.loads(p.read_text(encoding='utf-8'))

          def questions(title, key):
              stems = [
                  'ما الفكرة العملية الأساسية في ',
                  'ما أول خطوة صحيحة عند تطبيق ',
                  'لماذا يحتاج المحاسب إلى فهم ',
                  'أي دليل يساعد على دعم معالجة ',
                  'ما الخطأ الشائع عند التعامل مع ',
                  'كيف يؤثر سوء تطبيق ',
                  'متى نحتاج إلى حكم مهني إضافي في ',
                  'ما النتيجة المتوقعة من تطبيق سليم لـ '
              ]
              return [
                  {
                      'q': stem + title + '؟',
                      'options': [key, 'تجاهل المستندات المؤيدة', 'تسجيل القيد دون تحليل', 'إلغاء الإفصاح دائمًا'],
                      'answer': 0,
                      'explanation': key
                  }
                  for stem in stems
              ]

          def lesson(lesson_id, code, title, intro, key):
              return {
                  'id': lesson_id,
                  'code': code,
                  'standardCode': code,
                  'title': title,
                  'summary': [
                      intro,
                      'يربط الدرس بين القاعدة النظرية والتطبيق العملي في الشركات.',
                      'يتضمن أسئلة تدريبية تساعد الطالب على اختبار الفهم لا الحفظ فقط.'
                  ],
                  'longExplanation': [
                      intro + ' هذا الموضوع مهم لأن أي خطأ في فهمه قد يغير نتيجة الربح أو المركز المالي أو جودة القرار الإداري.',
                      'يبدأ التطبيق العملي من فهم طبيعة العملية: هل هي أصل أم مصروف؟ التزام أم إفصاح؟ قرار قصير الأجل أم قرار استثماري؟ هذا السؤال الأول يمنع كثيرًا من الأخطاء.',
                      'بعد ذلك يجب جمع الأدلة المناسبة مثل العقود، الفواتير، تقارير الإدارة، قرارات مجلس الإدارة، تقارير الخبراء، أو الموازنات الداخلية. قوة المعالجة تعتمد على قوة الأدلة.',
                      'ثم يتم تحديد أثر المعالجة على القوائم المالية أو التقارير الإدارية. بعض الحالات تؤثر على قائمة الدخل مباشرة، وبعضها يؤثر على المركز المالي، وبعضها يظهر أثره في الإيضاحات أو مؤشرات الأداء.',
                      'من الأخطاء الشائعة الاعتماد على اسم البند فقط دون قراءة التفاصيل. فقد يحمل البند اسمًا بسيطًا، لكن شروط العقد أو نية الإدارة أو طريقة الاستخدام تغير المعالجة بالكامل.',
                      'في التطبيق العملي يجب توثيق سبب القرار، وليس فقط النتيجة النهائية. التوثيق يساعد في المراجعة، ويقلل الخلافات، ويجعل التحليل قابلًا للفهم بعد فترة.',
                      'كما يجب مقارنة النتيجة مع الفترات السابقة ومع السياسات المعتمدة في الشركة، لأن الاتساق مهم ما لم توجد أسباب واضحة للتغيير.',
                      'الخلاصة أن ' + title + ' لا يهدف إلى حفظ قاعدة واحدة، بل إلى بناء طريقة تفكير منظمة تساعد المحاسب أو المدير على اتخاذ قرار صحيح ومدعوم بالأدلة.'
                  ],
                  'questions': questions(title, key)
              }

          ifrs_lessons = [
              ('ias_36_impairment_assets', 'IAS 36', 'هبوط قيمة الأصول', 'يعالج IAS 36 اختبار انخفاض قيمة الأصول عندما توجد مؤشرات على أن القيمة الدفترية قد لا تكون قابلة للاسترداد.', 'مقارنة القيمة الدفترية بالمبلغ القابل للاسترداد وتسجيل خسارة الهبوط عند الحاجة'),
              ('ias_37_provisions_contingencies', 'IAS 37', 'المخصصات والالتزامات المحتملة', 'يعالج IAS 37 متى يتم الاعتراف بالمخصص ومتى يكتفى بالإفصاح عن التزام محتمل.', 'الاعتراف بالمخصص عند وجود التزام حالي واحتمال تدفق موارد وقياس موثوق'),
              ('ias_38_intangible_assets', 'IAS 38', 'الأصول غير الملموسة', 'يركز IAS 38 على الاعتراف والقياس اللاحق للأصول غير الملموسة مثل البرمجيات والحقوق والتطوير.', 'تمييز الأصل غير الملموس القابل للاعتراف عن المصروف أو الشهرة الداخلية'),
              ('ias_41_agriculture', 'IAS 41', 'الزراعة والأصول الحيوية', 'يعالج IAS 41 المحاسبة عن الأصول الحيوية والمنتجات الزراعية في نقطة الحصاد.', 'قياس الأصول الحيوية غالبًا بالقيمة العادلة ناقص تكاليف البيع'),
              ('ifrs_13_fair_value_measurement', 'IFRS 13', 'قياس القيمة العادلة', 'يوضح IFRS 13 كيفية قياس القيمة العادلة والإفصاح عنها عندما تتطلبها معايير أخرى.', 'قياس السعر الذي يمكن الحصول عليه في معاملة منظمة بين أطراف السوق')
          ]

          cma_lessons = [
              ('cma_financial_statement_analysis_ratios', 'CMA', 'تحليل القوائم المالية بالنسب', 'يساعد تحليل النسب على قراءة السيولة والربحية والمديونية والكفاءة بدل الاكتفاء بالأرقام المطلقة.', 'استخدام النسب لفهم الأداء والمخاطر والاتجاهات عبر الزمن'),
              ('cma_operating_leverage', 'CMA', 'الرافعة التشغيلية', 'تقيس الرافعة التشغيلية حساسية الربح التشغيلي لتغير المبيعات بسبب وجود تكاليف ثابتة.', 'فهم أثر التكاليف الثابتة على مخاطر الربح عند تغير المبيعات'),
              ('cma_capital_rationing', 'CMA', 'ترشيد رأس المال', 'يعالج ترشيد رأس المال اختيار أفضل المشروعات عندما تكون الموارد الاستثمارية محدودة.', 'اختيار مجموعة الاستثمارات التي تحقق أعلى قيمة ضمن قيود التمويل'),
              ('cma_cash_budget', 'CMA', 'الموازنة النقدية', 'تساعد الموازنة النقدية على توقع الفائض أو العجز النقدي وتخطيط التمويل قصير الأجل.', 'توقع التدفقات النقدية الداخلة والخارجة لتجنب نقص السيولة'),
              ('cma_governance_audit_committee', 'CMA', 'الحوكمة ولجنة التدقيق', 'تركز الحوكمة على وضوح المسؤوليات والرقابة والشفافية ودور لجنة التدقيق في حماية جودة التقارير.', 'تعزيز الرقابة والاستقلالية وجودة التقارير من خلال حوكمة فعالة')
          ]

          data['version'] = 18
          data['updatedAt'] = '2026-06-26'
          data['appMessage'] = 'تمت إضافة تحديث رقم 18: عشرة دروس جديدة مع شروح عملية وأسئلة تدريبية.'

          for track in data.get('tracks', []):
              existing = {item.get('id') for item in track.get('lessons', [])}
              if track.get('id') == 'ifrs':
                  for item in ifrs_lessons:
                      if item[0] not in existing:
                          track.setdefault('lessons', []).append(lesson(*item))
              elif track.get('id') == 'cma':
                  for item in cma_lessons:
                      if item[0] not in existing:
                          track.setdefault('lessons', []).append(lesson(*item))

          p.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add academy_content.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Apply academy content v18"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
