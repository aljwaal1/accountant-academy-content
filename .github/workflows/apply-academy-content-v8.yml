name: Apply Academy Content V8

on:
  push:
    paths:
      - .github/workflows/apply-academy-content-v8.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply content update v8
        run: |
          python3 - <<'PYCODE'
          import base64, gzip, json, pathlib
          DATA_B64 = """

          """
          path = pathlib.Path('academy_content.json')
          content = json.loads(path.read_text(encoding='utf-8'))
          additions = json.loads(gzip.decompress(base64.b64decode(''.join(DATA_B64.split()))).decode('utf-8'))
          content['version'] = 8
          content['updatedAt'] = '2026-06-24'
          for track in content.get('tracks', []):
              tid = track.get('id')
              if tid not in additions:
                  continue
              existing = {lesson.get('id') for lesson in track.get('lessons', [])}
              for lesson in additions[tid]:
                  if lesson.get('id') not in existing:
                      track.setdefault('lessons', []).append(lesson)
          content['appMessage'] = 'تمت إضافة تحديث رقم 8: ثلاثة دروس IFRS/IAS وأربعة دروس CMA مع أسئلة وتطبيقات عملية.'
          path.write_text(json.dumps(content, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PYCODE
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add academy_content.json
          git commit -m "Apply academy content v8" || echo "No content changes"
          git push
