name: Apply Academy Content V14

on:
  push:
    paths:
      - '.github/workflows/apply-v14-content.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academy-content-update
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply v14 content
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          p=Path('academy_content.json')
          data=json.loads(p.read_text(encoding='utf-8'))

          def make_questions(title, key, alt1='تسجيل العملية دون تحليل', alt2='تجاهل الإفصاح', alt3='الاعتماد على التقدير فقط'):
              return [
                {'q':'ما الفكرة العملية الأساسية في '+title+'؟','options':[key,alt1,alt2,alt3],'answer':0,'explanation':key},
                {'q':'ما أول خطوة سليمة عند التعامل مع '+title+'؟','options':['فهم طبيعة العملية وجمع الأدلة','حذف العملية من السجلات','تأجيل كل القرارات','استخدام رقم تقريبي فقط'],'answer':0,'explanation':'التحليل يبدأ بفهم الحدث والوثائق المؤيدة قبل اختيار المعالجة.'},
                {'q':'ما الخطر الأكبر عند سوء تطبيق '+title+'؟','options':['تشويه نتيجة الفترة أو المركز المالي','زيادة وضوح التقارير','تحسين الرقابة تلقائيًا','تخفيض الحاجة للتوثيق'],'answer':0,'explanation':'المعالجة الخاطئة قد تؤدي إلى عرض غير عادل أو قرار إداري ضعيف.'},
                {'q':'أي إجراء يدعم جودة التطبيق في '+title+'؟','options':['توثيق الحكم المهني وربطه بالأدلة','تجاهل العقود','الاكتفاء باسم الحساب','تكرار قيد السنة السابقة دائمًا'],'answer':0,'explanation':'التوثيق يجعل القرار قابلًا للمراجعة والفهم.'},
                {'q':'متى نحتاج إلى مراجعة إضافية في '+title+'؟','options':['عند وجود تقدير جوهري أو أثر كبير على القوائم','عند صغر المبلغ دائمًا','عند عدم وجود مستندات فقط','عند انتهاء السنة فقط'],'answer':0,'explanation':'الأثر الجوهري والتقديرات المهمة تحتاج فحصًا أعمق.'},
                {'q':'كيف يساعد '+title+' مستخدمي المعلومات؟','options':['يعطي صورة أدق للقرار أو التقرير','يخفي تفاصيل مهمة','يلغي الحاجة للتحليل','يجعل كل البنود متشابهة'],'answer':0,'explanation':'الهدف النهائي هو رفع جودة المعلومات المحاسبية أو الإدارية.'},
                {'q':'أي مستند غالبًا يكون مفيدًا في '+title+'؟','options':['عقود أو فواتير أو تقارير داخلية حسب الحالة','صورة شعار الشركة','رسالة غير مرتبطة','لون شاشة التطبيق'],'answer':0,'explanation':'الأدلة العملية تختلف حسب الموضوع لكنها تدعم صحة المعالجة.'},
                {'q':'ما أفضل أسلوب لتعلم '+title+'؟','options':['تطبيقه على حالة عملية ومراجعة الأثر','حفظ العنوان فقط','تجاهل الأسئلة','قراءة التعريف دون أمثلة'],'answer':0,'explanation':'الأمثلة العملية تثبت الفكرة وتكشف أثرها على القوائم أو القرار.'}
              ]

          def lesson(id, code, title, intro, key):
              return {
                'id': id,
                'code': code,
                'standardCode': code,
                'title': title,
                'summary': [intro, 'يربط هذا الدرس بين القاعدة النظرية والتطبيق العملي داخل المنشآت.', 'يتضمن أسئلة تدريبية تساعد على اختبار الفهم لا الحفظ فقط.'],
                'longExplanation': [
                  intro,
                  'في التطبيق العملي لا يبدأ المحاسب أو المحاسب الإداري من القيد مباشرة، بل يبدأ من فهم الحدث: ما طبيعة العملية؟ من الأطراف؟ ما الفترة التي تخصها؟ وما المستندات التي تثبتها؟ هذه الخطوة تمنع كثيرًا من الأخطاء التي تحدث بسبب التسرع في التسجيل.',
                  'بعد ذلك يتم تحديد الأثر المالي أو الإداري. بعض الموضوعات تؤثر في قائمة الدخل، وبعضها في المركز المالي، وبعضها في التدفقات النقدية أو مؤشرات الأداء. لذلك يجب ربط الموضوع بالقائمة أو القرار الذي يتأثر به.',
                  'من المهم أيضًا التمييز بين القاعدة العامة والاستثناءات. فوجود عقد، أو شرط، أو تقدير جوهري، أو تغير في الظروف قد يغير النتيجة بالكامل. ولهذا لا يكفي استخدام قيد محفوظ أو نسبة ثابتة دون تحليل.',
                  'التوثيق عنصر أساسي. عند اختيار معالجة أو قرار معين يجب كتابة سبب الاختيار والأدلة المستخدمة. هذا يفيد عند المراجعة، وعند تغيير الموظفين، وعند مناقشة النتائج مع الإدارة أو المدقق.',
                  'الأخطاء الشائعة تظهر عندما يتم الخلط بين المصروف والأصل، أو بين الالتزام والإفصاح، أو بين القرار قصير الأجل والقرار طويل الأجل. لذلك يركز الدرس على طريقة التفكير قبل النتيجة النهائية.',
                  'في الشركات الصغيرة والمتوسطة يمكن تطبيق المفهوم بطريقة مبسطة، لكن دون إلغاء جوهره. المهم أن تكون الأرقام مفهومة، مدعومة، وقابلة للمقارنة بين الفترات.',
                  'الخلاصة أن '+title+' ليس عنوانًا نظريًا فقط، بل أداة لتحسين دقة التقارير وجودة القرارات عندما يستخدم بطريقة منظمة ومبنية على الأدلة.'
                ],
                'questions': make_questions(title, key)
              }

          ifrs = [
            ('ifrs_10_consolidated_financial_statements', 'IFRS 10', 'القوائم المالية الموحدة', 'يعالج IFRS 10 متى تسيطر المنشأة على منشأة أخرى وكيف يتم إعداد القوائم المالية الموحدة على أساس السيطرة.', 'تحديد السيطرة ثم تجميع القوائم لعرض المجموعة كوحدة اقتصادية واحدة'),
            ('ifrs_11_joint_arrangements', 'IFRS 11', 'الترتيبات المشتركة', 'يعالج IFRS 11 المحاسبة عن الترتيبات التي يشارك فيها طرفان أو أكثر في السيطرة المشتركة.', 'تمييز العملية المشتركة عن المشروع المشترك واختيار المعالجة المناسبة'),
            ('ias_16_ppe_depreciation', 'IAS 16', 'العقارات والآلات والمعدات والاستهلاك', 'يركز IAS 16 على الاعتراف بالأصول الثابتة وقياسها واستهلاكها ومراجعة قيمتها خلال العمر الإنتاجي.', 'رسملة الأصل عند تحقق المنافع المستقبلية ثم استهلاكه بطريقة تعكس نمط الاستخدام'),
            ('ias_20_government_grants', 'IAS 20', 'المنح الحكومية والمساعدات الحكومية', 'يعالج IAS 20 كيفية الاعتراف بالمنح الحكومية وعرضها عندما تلتزم المنشأة بشروط معينة للحصول عليها.', 'الاعتراف بالمنحة بطريقة منتظمة عند تحقق الشروط ومقابل المصروفات المرتبطة'),
            ('ifrs_17_insurance_contracts_intro', 'IFRS 17', 'مقدمة في عقود التأمين', 'يعالج IFRS 17 قياس وعرض عقود التأمين بطريقة تعكس الالتزامات والتدفقات النقدية والمخاطر المرتبطة بها.', 'قياس عقود التأمين بناءً على التدفقات النقدية والمخاطر والخدمة التأمينية')
          ]
          cma = [
            ('cma_variance_analysis_material_labor', 'CMA', 'تحليل انحرافات المواد والعمل', 'يركز هذا الدرس على مقارنة التكلفة الفعلية بالتكلفة المعيارية لمعرفة أسباب الانحراف في السعر أو الكمية أو الكفاءة.', 'فصل الانحراف إلى سعر وكمية أو معدل وكفاءة لتحديد سبب المشكلة'),
            ('cma_responsibility_accounting', 'CMA', 'محاسبة المسؤولية ومراكز الأداء', 'تعتمد محاسبة المسؤولية على تقييم المديرين حسب البنود التي يستطيعون التأثير فيها داخل مراكز تكلفة أو ربح أو استثمار.', 'تقييم كل مدير بناءً على عناصر تقع ضمن نطاق مسؤوليته'),
            ('cma_capital_budgeting_npv_irr', 'CMA', 'تقييم الاستثمارات باستخدام NPV وIRR', 'يساعد هذا الدرس على تقييم المشروعات طويلة الأجل باستخدام صافي القيمة الحالية ومعدل العائد الداخلي.', 'اختيار الاستثمار بناءً على التدفقات النقدية المخصومة وقيمة المشروع'),
            ('cma_cost_volume_profit_sensitivity', 'CMA', 'تحليل الحساسية في الربح والتكلفة والحجم', 'يركز على اختبار أثر تغير السعر أو التكلفة أو حجم المبيعات على الربح ونقطة التعادل.', 'فهم كيف تتغير الأرباح عند تغير الافتراضات الرئيسية'),
            ('cma_quality_costs', 'CMA', 'تكاليف الجودة', 'يقسم هذا الدرس تكاليف الجودة إلى وقاية وتقييم وفشل داخلي وفشل خارجي لربط الجودة بالربحية.', 'تحليل تكاليف الجودة لتقليل الفشل وتحسين الربحية')
          ]

          data['version'] = max(int(data.get('version', 13)) + 1, 14)
          data['updatedAt'] = '2026-06-26'
          data['appMessage'] = 'تمت إضافة تحديث جديد: 10 دروس عملية مع أسئلة تدريبية في IFRS/IAS وCMA.'
          for tr in data.get('tracks', []):
              if tr.get('id') == 'ifrs':
                  existing = {x.get('id') for x in tr.get('lessons', [])}
                  for item in ifrs:
                      if item[0] not in existing:
                          tr.setdefault('lessons', []).append(lesson(*item))
              if tr.get('id') == 'cma':
                  existing = {x.get('id') for x in tr.get('lessons', [])}
                  for item in cma:
                      if item[0] not in existing:
                          tr.setdefault('lessons', []).append(lesson(*item))
          p.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add academy_content.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Apply academy content v14"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
