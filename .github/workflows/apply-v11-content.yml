name: Apply Academy Content V11

on:
  push:
    paths:
      - '.github/workflows/apply-v11-content.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academy-content-update
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply v11 content
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          p=Path('academy_content.json')
          data=json.loads(p.read_text(encoding='utf-8'))

          def mkq(title,key):
              stems=['ما جوهر درس ','ما أول خطوة عملية في ','لماذا يعد درس ','ما الخطر من سوء تطبيق ','أي دليل يدعم معالجة ','كيف يؤثر درس ','متى يحتاج المحاسب إلى حكم مهني في ','ما أفضل نتيجة من فهم ']
              return [{'q':s+title+'؟','options':[key,'إهمال المستندات','تسجيل قيد عشوائي','تجاهل أثر العملية'],'answer':0,'explanation':key} for s in stems]

          def lesson(id,code,title,intro,key):
              return {'id':id,'code':code,'standardCode':code,'title':title,'summary':[intro,'يركز الدرس على الفهم العملي وربط القاعدة بالمثال.','يتضمن أسئلة تدريبية مع تفسير للإجابة الصحيحة.'],'longExplanation':[intro+' يساعد هذا الموضوع على تحسين جودة الحكم المحاسبي أو القرار الإداري.','الخطوة الأولى هي فهم طبيعة العملية قبل التفكير في القيد أو التقرير. فالمحاسب الجيد لا يبدأ من الحساب، بل يبدأ من الحدث الاقتصادي نفسه.','بعد ذلك يتم تحديد المستندات والأدلة: عقد، فاتورة، سياسة، مراسلة، قرار إدارة، أو بيانات تشغيلية. قوة المعالجة تعتمد على قوة هذه الأدلة.','ثم يتم تحديد الأثر: هل يوجد أصل؟ هل يوجد التزام؟ هل تغير الربح؟ هل يوجد أثر نقدي؟ هل المطلوب إفصاح فقط؟ هذه الأسئلة تجعل المعالجة أكثر دقة.','في التطبيق العملي قد تختلف حالتان تحملان نفس الاسم بسبب اختلاف الشروط أو التوقيت أو القدرة على القياس. لذلك يجب تجنب نسخ معالجة سابقة دون فحص.','من المفيد أيضًا ربط الموضوع بالمخاطر. بعض الأخطاء تضخم الأصول، وبعضها يخفض الالتزامات، وبعضها يعطي الإدارة مؤشر أداء مضللًا.','عند وجود عدم تأكد، يجب توثيق الافتراضات وشرح سبب اختيار المعالجة. هذا التوثيق مهم عند المراجعة أو عند مناقشة الإدارة والمدققين.','الخلاصة أن '+title+' ليس درسًا للحفظ فقط، بل أداة لفهم الواقع المالي وتحويله إلى معلومات موثوقة ومفيدة.'],'questions':mkq(title,key)}

          ifrs=[
            ('ias_12_income_taxes','IAS 12','ضرائب الدخل والضريبة المؤجلة','يعالج IAS 12 الفروق بين الربح المحاسبي والربح الضريبي والاعتراف بالضريبة الحالية والمؤجلة.','تمييز الضريبة الحالية عن المؤجلة وفهم الفروق المؤقتة'),
            ('ias_21_foreign_currency','IAS 21','آثار تغير أسعار صرف العملات','يعالج IAS 21 ترجمة العمليات والأرصدة بالعملات الأجنبية وأثر فروقات الصرف.','تحديد العملة الوظيفية ومعالجة فروقات الصرف'),
            ('ias_23_borrowing_costs','IAS 23','تكاليف الاقتراض','يعالج IAS 23 متى تتم رسملة تكاليف الاقتراض ضمن أصل مؤهل ومتى تسجل كمصروف.','رسملة تكاليف الاقتراض المرتبطة بالأصول المؤهلة'),
            ('ias_24_related_parties','IAS 24','الإفصاح عن الأطراف ذات العلاقة','يركز IAS 24 على الإفصاح عن العلاقات والمعاملات مع الأطراف ذات العلاقة وتأثيرها المحتمل.','كشف العلاقات التي قد تؤثر على قرارات المستخدمين'),
            ('ifrs_13_fair_value','IFRS 13','قياس القيمة العادلة','يوضح IFRS 13 إطار قياس القيمة العادلة وترتيب مستويات المدخلات المستخدمة في القياس.','قياس السعر الذي يمكن الحصول عليه في معاملة منظمة بين أطراف السوق')]
          cma=[
            ('cma_internal_controls','CMA','الرقابة الداخلية وإدارة المخاطر','تساعد الرقابة الداخلية على حماية الأصول ورفع موثوقية التقارير وتقليل الأخطاء والاحتيال.','تصميم ضوابط تقلل المخاطر وتحسن موثوقية المعلومات'),
            ('cma_capital_structure','CMA','هيكل رأس المال وتكلفة التمويل','يركز الدرس على مزيج الدين وحقوق الملكية وأثره على المخاطر وتكلفة رأس المال.','اختيار تمويل يوازن بين العائد والمخاطر'),
            ('cma_cash_budgeting','CMA','موازنة النقد والسيولة','تساعد موازنة النقد على توقع الفوائض والعجوزات وتخطيط التمويل والتحصيل والدفع.','توقع السيولة قبل حدوث العجز أو الفائض'),
            ('cma_inventory_management','CMA','إدارة المخزون ومخاطر التخزين','يربط الدرس بين تكلفة الاحتفاظ بالمخزون وتكلفة الطلب ونقص المخزون وتأثيرها على الربحية.','تحقيق توازن بين توفر المخزون وتكلفة الاحتفاظ به'),
            ('cma_customer_profitability','CMA','ربحية العملاء وتحليل القنوات','يركز على قياس ربحية كل عميل أو قناة بعد احتساب تكاليف الخدمة والدعم والخصومات.','تحليل الربحية الحقيقية للعملاء لا حجم المبيعات فقط')]
          data['version']=11
          data['updatedAt']='2026-06-25'
          data['appMessage']='تمت إضافة تحديث رقم 11: عشرة دروس جديدة مع أسئلة تدريبية.'
          for tr in data.get('tracks',[]):
              if tr.get('id')=='ifrs':
                  ex={x.get('id') for x in tr.get('lessons',[])}
                  for it in ifrs:
                      if it[0] not in ex: tr.setdefault('lessons',[]).append(lesson(*it))
              if tr.get('id')=='cma':
                  ex={x.get('id') for x in tr.get('lessons',[])}
                  for it in cma:
                      if it[0] not in ex: tr.setdefault('lessons',[]).append(lesson(*it))
          p.write_text(json.dumps(data,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add academy_content.json
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Apply academy content v11"; git pull --rebase origin main; git push origin HEAD:main; fi
