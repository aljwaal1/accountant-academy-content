name: Audit Academy Content

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "academy_content.json"
      - "quality/**"
      - "scripts/validate_academy_content.py"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin "${{ github.base_ref }}:${{ github.base_ref }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate JSON and lesson quality
        if: github.event_name == 'pull_request'
        run: python scripts/validate_academy_content.py --base-ref "${{ github.base_ref }}"

      - name: Validate current content
        if: github.event_name != 'pull_request'
        run: python scripts/validate_academy_content.py
