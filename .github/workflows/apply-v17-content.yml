name: Apply Academy Content V17

on:
  push:
    paths:
      - '.github/workflows/apply-v17-content.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academy-content-update
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply v17 content
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          p = Path('academy_content.json')
          data = json.loads(p.read_text(encoding='utf-8'))

          def make_questions(title, key, focus):
              raw = [
                  (f'ما الهدف العملي من {title}؟', [key, 'تجاهل أثر العملية', 'تسجيل كل شيء كمصروف', 'إلغاء التحليل المالي'], 0, key),
                  (f'أي خطوة تساعد على تطبيق {title} بشكل صحيح؟', ['قراءة تفاصيل الحالة وجمع الأدلة', 'الاكتفاء باسم المعيار', 'توحيد كل المعالجات', 'تجاهل الفترة المالية'], 0, 'التطبيق الصحيح يبدأ من فهم الوقائع والأدلة.'),
                  (f'ما الخطر عند سوء فهم {title}؟', ['تشويه الأرقام أو القرار الإداري', 'زيادة وضوح التقارير دائمًا', 'انخفاض الحاجة للتوثيق', 'اختفاء المخاطر'], 0, 'الخطأ في التحليل قد يؤثر على القوائم أو القرار.'),
                  (f'لماذا يحتاج {title} إلى توثيق؟', ['لشرح سبب المعالجة عند المراجعة', 'لإخفاء الافتراضات', 'لمنع المقارنة', 'لتقليل جودة القرار'], 0, 'التوثيق يحمي القرار ويجعل المراجعة أسهل.'),
                  (f'أي عبارة أقرب إلى {title}؟', [focus, 'قرار عشوائي دون بيانات', 'معالجة نقدية فقط', 'قاعدة ثابتة لا تتغير'], 0, focus),
                  (f'متى نراجع الحكم المهني في {title}؟', ['عند وجود تقديرات أو شروط غير واضحة', 'عند عدم وجود أي عملية', 'عند طباعة التقرير فقط', 'بعد حذف المستندات'], 0, 'الحكم المهني مهم عندما تتغير الوقائع أو تزيد التقديرات.'),
                  (f'كيف يستفيد المستخدم من {title}؟', ['تحسين دقة التقرير أو جودة القرار', 'زيادة الحفظ النظري فقط', 'تجاهل المؤشرات', 'تقليل الإفصاح المفيد'], 0, 'الفائدة العملية هي تحسين الفهم والقرار.'),
                  (f'ما أفضل أسلوب لدراسة {title}؟', ['ربط القاعدة بمثال عملي', 'حفظ العنوان فقط', 'تجاهل الأسئلة', 'قراءة خيار واحد فقط'], 0, 'الأمثلة العملية تثبت الفكرة وتوضح أثرها.')
              ]
              return [{'q': q, 'options': opts, 'answer': ans, 'explanation': exp} for q, opts, ans, exp in raw]

          def lesson(id, code, title, intro, key, focus):
              return {
                  'id': id,
                  'code': code,
                  'standardCode': code,
                  'title': title,
                  'summary': [
                      intro,
                      'يركز الدرس على التطبيق العملي وليس الحفظ النظري فقط.',
                      'يتضمن أسئلة تدريبية تساعد على فهم أثر الموضوع على التقارير أو القرارات.'
                  ],
                  'longExplanation': [
                      intro + ' تظهر أهمية هذا الموضوع عندما لا تكون العملية بسيطة أو عندما تحتاج الإدارة والمحاسب إلى حكم مهني واضح.',
                      'الخطوة الأولى هي تحديد طبيعة العملية: هل هي بند مالي، علاقة مع طرف آخر، تكلفة تمويل، قطاع تشغيلي، قرار تسعير، أو أداة رقابة؟ هذا التحديد يمنع اختيار معالجة غير مناسبة.',
                      'بعد ذلك يتم جمع الأدلة المتاحة مثل العقود والفواتير ومحاضر الإدارة والتقارير الداخلية والموازنات ومراسلات الأطراف. جودة الدليل تؤثر مباشرة على قوة المعالجة.',
                      'ثم يتم تحليل الأثر على القوائم المالية أو القرار الإداري. بعض الموضوعات تغير توقيت الاعتراف، وبعضها يغير العرض أو الإفصاح، وبعضها يساعد الإدارة على اختيار بديل أفضل.',
                      'من الأخطاء الشائعة استخدام عنوان الموضوع فقط دون قراءة تفاصيل الحالة. قد تبدو حالتان متشابهتين لكن اختلاف شرط واحد في العقد أو في الطاقة الإنتاجية أو في المخاطر يغير النتيجة بالكامل.',
                      'التطبيق العملي يحتاج أيضًا إلى توثيق الافتراضات. عندما نكتب لماذا اخترنا هذه المعالجة أو هذا القرار، يصبح من السهل مراجعة العمل وتحسينه لاحقًا.',
                      'ينبغي ربط هذا الدرس بمثال رقمي أو حالة واقعية. المثال يجعل المستخدم يرى كيف ينتقل التحليل من النص النظري إلى أثر واضح على الربح أو المركز المالي أو التدفق النقدي أو مؤشرات الأداء.',
                      'الخلاصة أن ' + title + ' ليس مجرد عنوان ضمن المنهج، بل أداة تساعد المحاسب أو المدير على إنتاج معلومات أو قرارات أكثر دقة وشفافية.'
                  ],
                  'questions': make_questions(title, key, focus)
              }

          ifrs = [
              ('ias_21_foreign_exchange', 'IAS 21', 'آثار التغيرات في أسعار صرف العملات الأجنبية', 'يعالج IAS 21 كيفية تسجيل العمليات بالعملات الأجنبية وترجمة القوائم المالية عند اختلاف العملة الوظيفية أو عملة العرض.', 'تحديد العملة الوظيفية ومعالجة فروقات الصرف بشكل صحيح', 'معالجة فروقات الصرف والترجمة بناءً على العملة الوظيفية'),
              ('ias_23_borrowing_costs', 'IAS 23', 'تكاليف الاقتراض', 'يعالج IAS 23 متى تتم رسملة تكاليف الاقتراض المرتبطة بأصل مؤهل ومتى تُعترف كمصروف.', 'تمييز تكاليف الاقتراض التي ترسمل عن التي تحمل على المصروف', 'رسملة تكاليف الاقتراض فقط عندما ترتبط بأصل مؤهل'),
              ('ias_24_related_parties', 'IAS 24', 'الإفصاح عن الأطراف ذات العلاقة', 'يركز IAS 24 على الإفصاح عن العلاقات والمعاملات مع الأطراف ذات العلاقة وتأثيرها على مستخدمي القوائم.', 'الإفصاح عن علاقات ومعاملات قد تؤثر على قرارات المستخدمين', 'زيادة شفافية القوائم عند وجود أطراف ذات علاقة'),
              ('ias_33_earnings_per_share', 'IAS 33', 'ربحية السهم', 'يعالج IAS 33 طريقة حساب وعرض ربحية السهم الأساسية والمخفضة للشركات التي تعرض أسهمها للتداول.', 'حساب ربحية السهم بطريقة قابلة للمقارنة', 'ربط الربح بعدد الأسهم وتأثير الأدوات المخفضة'),
              ('ifrs_8_operating_segments', 'IFRS 8', 'القطاعات التشغيلية', 'يعالج IFRS 8 الإفصاح عن القطاعات التشغيلية كما تراها الإدارة في التقارير الداخلية.', 'عرض معلومات القطاعات التي تساعد المستثمر على فهم مصادر الأداء', 'استخدام منظور الإدارة لفهم أداء القطاعات')
          ]
          cma = [
              ('cma_overhead_variance', 'CMA', 'انحرافات التكاليف الصناعية غير المباشرة', 'يركز هذا الدرس على تحليل انحرافات المصاريف الصناعية غير المباشرة لفهم أسباب الاختلاف بين الفعلي والمخطط.', 'فصل انحراف الإنفاق والكفاءة والحجم لتحسين الرقابة', 'تحليل الانحرافات يساعد على الرقابة وليس اللوم فقط'),
              ('cma_profitability_analysis', 'CMA', 'تحليل ربحية العملاء والمنتجات', 'يساعد تحليل الربحية على معرفة المنتجات أو العملاء الذين يضيفون قيمة حقيقية بعد احتساب التكاليف الملائمة.', 'توجيه الموارد نحو المنتجات والعملاء الأكثر ربحية', 'الربحية الحقيقية قد تختلف عن حجم المبيعات الظاهر'),
              ('cma_pricing_decisions', 'CMA', 'قرارات التسعير', 'يعالج هذا الدرس استخدام التكلفة والسوق والطاقة المتاحة في تحديد سعر مناسب يحقق الربحية والاستدامة.', 'تحديد السعر بناءً على التكلفة والقيمة والمنافسة', 'السعر الجيد يوازن بين السوق والتكلفة والهدف الربحي'),
              ('cma_enterprise_risk_management', 'CMA', 'إدارة المخاطر المؤسسية', 'تركز إدارة المخاطر المؤسسية على تحديد المخاطر وتقييمها والاستجابة لها وربطها بالأهداف الاستراتيجية.', 'ربط المخاطر بالأهداف ووضع استجابة مناسبة', 'إدارة المخاطر تقلل المفاجآت وتحسن جودة القرار'),
              ('cma_internal_controls', 'CMA', 'الرقابة الداخلية', 'تساعد الرقابة الداخلية على حماية الأصول وتحسين دقة المعلومات والالتزام بالسياسات والإجراءات.', 'تصميم ضوابط تمنع الأخطاء والاحتيال وتدعم موثوقية المعلومات', 'الرقابة الداخلية نظام وقائي وكاشف وليس إجراءً شكليًا')
          ]

          data['version'] = max(int(data.get('version', 16)) + 1, 17)
          data['updatedAt'] = '2026-06-26'
          data['appMessage'] = 'تمت إضافة تحديث جديد: 10 دروس إضافية مع شروح عملية وأسئلة تدريبية.'

          for track in data.get('tracks', []):
              existing = {x.get('id') for x in track.get('lessons', [])}
              if track.get('id') == 'ifrs':
                  for item in ifrs:
                      if item[0] not in existing:
                          track.setdefault('lessons', []).append(lesson(*item))
              if track.get('id') == 'cma':
                  for item in cma:
                      if item[0] not in existing:
                          track.setdefault('lessons', []).append(lesson(*item))

          p.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add academy_content.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Apply academy content v17"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
