name: Apply Academy Content V10

on:
  push:
    paths:
      - '.github/workflows/apply-v10-content.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academy-content-update
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply v10 content
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          p = Path('academy_content.json')
          data = json.loads(p.read_text(encoding='utf-8'))

          def q(t, key):
              qs=[]
              stems=[
                'ما الفكرة الأساسية في ', 'ما أول خطوة عملية في ', 'لماذا يحتاج المحاسب إلى فهم ', 'ما أثر التطبيق الصحيح لـ ',
                'أي دليل يساعد في معالجة ', 'ما الخطأ الشائع عند تطبيق ', 'كيف يدعم هذا الموضوع جودة ', 'متى نحتاج إلى حكم مهني في ',
                'ما أفضل طريقة لمراجعة ', 'كيف يفيد هذا الموضوع الإدارة في ', 'ما العلاقة بين التوثيق و', 'ما النتيجة المتوقعة من إتقان '
              ]
              opts=[key,'الاكتفاء بالعنوان دون تحليل','استخدام رقم سابق دون مراجعة','إهمال أثر العملية على التقرير']
              for s in stems:
                  qs.append({'q':s+t+'؟','options':opts,'answer':0,'explanation':key})
              return qs

          def lesson(id, code, title, intro, key):
              long=[
                intro + ' هذا الدرس يقدم شرحًا موسعًا يربط بين الفكرة المحاسبية والتطبيق العملي داخل المنشأة.',
                'يبدأ التحليل المهني بفهم طبيعة العملية، ثم تحديد تاريخها، ثم معرفة الأطراف المتأثرة بها، ثم ربط ذلك بالمعيار أو أداة الإدارة المناسبة.',
                'في التطبيق العملي لا يكفي معرفة اسم المعيار أو اسم الأداة، لأن التفاصيل الصغيرة في العقد أو السياسة أو طريقة التشغيل قد تغير طريقة القياس أو العرض أو القرار.',
                'يحتاج المحاسب إلى جمع الأدلة قبل الوصول إلى النتيجة. من أمثلة الأدلة: العقود، الفواتير، قرارات الإدارة، السياسات الداخلية، حركة النقد، وتقارير الأقسام.',
                'بعد جمع الأدلة، يتم تحديد الأثر على الأصول والالتزامات والإيرادات والمصروفات أو على مؤشرات الأداء في التقارير الإدارية.',
                'الخطوة التالية هي مقارنة البدائل المتاحة. أحيانًا تكون المعالجة رقمية مباشرة، وأحيانًا تكون المسألة متعلقة بالعرض أو الإفصاح أو تفسير النتائج للإدارة.',
                'من المهم توثيق الافتراضات المستخدمة، لأن جودة التقرير لا تعتمد على الرقم فقط بل على قدرة المحاسب على تفسير سبب اختياره لهذه المعالجة.',
                'في الحياة العملية تظهر قيمة هذا الموضوع عند وجود نقاش مع الإدارة أو المدقق أو صاحب القرار، حيث يحتاج المحاسب إلى شرح الأثر بلغة واضحة ومقنعة.',
                'مثال مبسط: عند ظهور عملية جديدة، يبدأ المحاسب بسؤال: هل يوجد أصل أو التزام؟ هل يوجد تدفق نقدي؟ هل يوجد أثر على الربح؟ هل يحتاج الأمر إلى إفصاح؟',
                'إذا كانت المعلومات غير كاملة، يجب عدم التسرع. الأفضل تحديد المعلومات الناقصة وطلبها ثم إجراء تحليل مبني على أساس واضح.',
                'هذا الدرس يساعد المستخدم على بناء طريقة تفكير منظمة يمكن تكرارها في حالات متعددة، بدل التعامل مع كل حالة كأنها منفصلة تمامًا.',
                'الخلاصة أن ' + title + ' مهارة عملية تساعد على تحسين جودة التقارير والقرارات عندما يتم تطبيقها بمنهجية واضحة.'
              ]
              return {'id':id,'code':code,'standardCode':code,'title':title,'summary':[intro,'شرح مضاعف مع خطوات عملية واضحة.','يتضمن اثني عشر سؤالًا للتدريب والمراجعة.'],'longExplanation':long,'questions':q(title,key)}

          ifrs=[
            ('ias_2_inventory_practical','IAS 2','المخزون وصافي القيمة القابلة للتحقق','يعالج IAS 2 قياس المخزون بالتكلفة أو صافي القيمة القابلة للتحقق أيهما أقل.','قياس المخزون بطريقة تعكس القيمة القابلة للاسترداد'),
            ('ias_20_government_grants','IAS 20','المنح الحكومية والمساعدات','يعالج IAS 20 الاعتراف بالمنح الحكومية وربطها بالشروط والفترات المناسبة.','ربط المنحة بالشروط والتكاليف ذات العلاقة'),
            ('ias_37_provisions_cases','IAS 37','المخصصات والالتزامات المحتملة','يعالج IAS 37 متى يتم الاعتراف بالمخصص ومتى يكتفى بالإفصاح.','تمييز المخصص عن الالتزام المحتمل'),
            ('ifrs_2_share_based_payment','IFRS 2','الدفع على أساس الأسهم','يعالج IFRS 2 تكلفة الخدمات أو السلع التي يتم سدادها بأدوات حقوق ملكية أو مبالغ مرتبطة بالسهم.','قياس تكلفة الدفع على أساس الأسهم خلال فترة الاستحقاق'),
            ('ifrs_12_disclosure_interests','IFRS 12','الإفصاح عن الحصص في المنشآت الأخرى','يركز IFRS 12 على الإفصاح عن طبيعة ومخاطر الحصص في المنشآت الأخرى.','توضيح طبيعة العلاقة والمخاطر في الاستثمارات')]
          cma=[
            ('cma_standard_costing_deep','CMA','التكاليف المعيارية والانحرافات المتقدمة','تستخدم التكاليف المعيارية لمقارنة الأداء الفعلي بالمخطط وتحليل أسباب الاختلاف.','تحليل الانحراف لمعرفة السبب وليس الرقم فقط'),
            ('cma_pricing_decisions','CMA','قرارات التسعير وتحليل الربحية','تربط قرارات التسعير بين التكلفة والقيمة والسوق والطاقة المتاحة.','اختيار سعر يدعم الربحية والمنافسة'),
            ('cma_forecasting_planning','CMA','التنبؤ والتخطيط المالي','يعتمد التخطيط المالي على توقع المبيعات والتكاليف والنقد ضمن سيناريوهات واضحة.','بناء توقعات مالية تساعد الإدارة على الاستعداد'),
            ('cma_product_mix_constraints','CMA','مزيج المنتجات والموارد المحدودة','يساعد تحليل مزيج المنتجات على اختيار البدائل الأفضل عند وجود مورد محدود.','تعظيم هامش المساهمة لكل وحدة من المورد المحدود'),
            ('cma_performance_metrics_balanced','CMA','مؤشرات الأداء وبطاقة الأداء المتوازن','تربط بطاقة الأداء بين المؤشرات المالية والعملاء والعمليات والتعلم والنمو.','تقييم الأداء بصورة متوازنة لا تعتمد على الربح فقط')]

          data['version']=10
          data['updatedAt']='2026-06-25'
          data['appMessage']='تمت إضافة تحديث رقم 10: عشرة دروس جديدة بشرح مضاعف واثني عشر سؤالًا لكل درس.'
          for tr in data.get('tracks',[]):
              if tr.get('id')=='ifrs':
                  ex={x.get('id') for x in tr.get('lessons',[])}
                  for it in ifrs:
                      if it[0] not in ex: tr.setdefault('lessons',[]).append(lesson(*it))
              if tr.get('id')=='cma':
                  ex={x.get('id') for x in tr.get('lessons',[])}
                  for it in cma:
                      if it[0] not in ex: tr.setdefault('lessons',[]).append(lesson(*it))
          p.write_text(json.dumps(data, ensure_ascii=False, indent=2)+'\n', encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add academy_content.json
          if git diff --cached --quiet; then
            echo "No content changes"
          else
            git commit -m "Apply academy content v10"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
