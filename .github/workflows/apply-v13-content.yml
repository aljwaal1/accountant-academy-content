name: Apply Academy Content V13

on:
  push:
    paths:
      - '.github/workflows/apply-v13-content.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academy-content-update
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply v13 content
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          p=Path('academy_content.json')
          data=json.loads(p.read_text(encoding='utf-8'))

          def make_questions(title, key, code):
              return [
                {'q':f'ما الهدف العملي من درس {title}؟','options':[key,'حفظ رقم المعيار فقط','إلغاء التوثيق','تسجيل كل البنود كمصروف'],'answer':0,'explanation':key},
                {'q':f'ما أول خطوة صحيحة عند تطبيق {title}؟','options':['فهم طبيعة العملية وجمع الأدلة','تجاهل العقد','تسجيل قيد عشوائي','تأجيل التحليل لنهاية السنة فقط'],'answer':0,'explanation':'الفهم الجيد للعملية والأدلة هو أساس المعالجة الصحيحة.'},
                {'q':f'ما الخطر من سوء تطبيق {title}؟','options':['تشويه الأرقام أو القرار الإداري','تحسين جودة التقارير دائمًا','إلغاء الحاجة للمراجعة','عدم وجود أي أثر'],'answer':0,'explanation':'التطبيق الخاطئ قد يؤثر على الربح أو الأصول أو الالتزامات أو جودة القرار.'},
                {'q':f'أي دليل يساعد أكثر في {title}؟','options':['العقود والفواتير والتقارير الداخلية ذات العلاقة','لون الشعار','اسم الملف فقط','رأي غير موثق'],'answer':0,'explanation':'الأدلة الرسمية والداخلية تدعم الحكم المهني والمعالجة المحاسبية.'},
                {'q':f'لماذا يحتاج {code} إلى حكم مهني؟','options':['لأن تفاصيل الحالة قد تغير المعالجة','لأن كل الحالات متطابقة','لأن الإفصاح غير مهم','لأن القياس ممنوع'],'answer':0,'explanation':'الحكم المهني ضروري عندما تختلف العقود أو الظروف أو التقديرات.'},
                {'q':f'متى نراجع معالجة {title}؟','options':['عند تغير الظروف أو ظهور معلومات جديدة','مرة واحدة فقط للأبد','عند حذف المستندات','لا تتم المراجعة مطلقًا'],'answer':0,'explanation':'المراجعة مهمة عند تغير الظروف أو التقديرات أو ظهور أدلة جديدة.'},
                {'q':f'ما أفضل طريقة لتثبيت فهم {title}؟','options':['تطبيقه على حالة عملية مع أسئلة','قراءة العنوان فقط','حذف الأمثلة','تجاهل الأثر المالي'],'answer':0,'explanation':'الأمثلة والأسئلة تجعل المعرفة قابلة للتطبيق لا مجرد حفظ.'},
                {'q':f'ما النتيجة المتوقعة من التطبيق الجيد لـ {title}؟','options':['أرقام أو قرارات أكثر دقة ووضوحًا','زيادة الأخطاء','إخفاء المعلومات','إلغاء الحاجة للرقابة'],'answer':0,'explanation':'التطبيق الجيد يحسن موثوقية التقارير أو القرارات الإدارية.'}
              ]

          def lesson(id, code, title, intro, key):
              return {
                'id': id,
                'code': code,
                'standardCode': code,
                'title': title,
                'summary': [intro, 'يعرض الدرس الفكرة بطريقة عملية مرتبطة بالواقع المهني.', 'يحتوي على أسئلة تدريبية تساعد على قياس الفهم قبل الانتقال للدرس التالي.'],
                'longExplanation': [
                  intro,
                  'الفكرة الأساسية في هذا الموضوع أن المحاسب أو المحلل لا يبدأ من القيد مباشرة، بل يبدأ من فهم الحدث الاقتصادي: ما الذي حدث؟ من الأطراف؟ ما الفترة المالية؟ وما الدليل المتاح؟',
                  'بعد فهم الحدث يتم تحديد أثره على القوائم المالية أو القرار الإداري. قد يكون الأثر على الربح، أو الأصول، أو الالتزامات، أو التدفقات النقدية، أو مؤشرات الأداء. هذا التحديد يمنع الخلط بين البنود المتشابهة.',
                  'في التطبيق العملي يجب ربط المعالجة بالمستندات. العقد، الفاتورة، كشف المطابقة، تقرير الإدارة، أو جدول الاحتساب ليست مجرد أوراق؛ بل هي أساس الدفاع عن القرار المحاسبي عند المراجعة.',
                  'من الأخطاء الشائعة أن يتم تطبيق قاعدة محفوظة دون قراءة التفاصيل. في المعايير الدولية وموضوعات CMA، التفاصيل الصغيرة مثل التوقيت، القابلية للتحصيل، وجود التزام، أو توفر الطاقة الإنتاجية قد تغير النتيجة بالكامل.',
                  'لذلك من الأفضل استخدام خطوات ثابتة: تحديد الحالة، جمع الأدلة، اختيار المعالجة، حساب الأثر، توثيق السبب، ثم مراجعة النتيجة مع شخص آخر عند وجود تقدير مهم.',
                  'هذا الدرس مفيد خصوصًا للطلاب والمحاسبين الجدد لأنه يحول الموضوع من تعريف نظري إلى طريقة تفكير عملية يمكن استخدامها في العمل والاختبارات.',
                  'الخلاصة: '+key+'.'
                ],
                'questions': make_questions(title, key, code)
              }

          ifrs=[
            ('ifrs_1_first_time_adoption','IFRS 1','التبني لأول مرة للمعايير الدولية','يعالج IFRS 1 كيفية إعداد أول قوائم مالية وفق IFRS عند انتقال المنشأة من إطار محاسبي آخر.','بناء نقطة بداية موثوقة عند الانتقال إلى IFRS'),
            ('ifrs_4_insurance_contracts','IFRS 4','عقود التأمين - تمهيد ومفاهيم','يركز IFRS 4 تاريخيًا على عقود التأمين قبل التطبيق الكامل لمنهج IFRS 17 في كثير من البيئات.','فهم طبيعة عقود التأمين ومخاطرها قبل التعمق في IFRS 17'),
            ('ifrs_12_disclosure_interests','IFRS 12','الإفصاح عن الحصص في المنشآت الأخرى','يتناول IFRS 12 الإفصاحات المتعلقة بالشركات التابعة والزميلة والترتيبات المشتركة والمنشآت المهيكلة.','توضيح المخاطر والآثار الناتجة عن الاستثمار أو السيطرة في منشآت أخرى'),
            ('ias_27_separate_financial_statements','IAS 27','القوائم المالية المنفصلة','يعالج IAS 27 عرض وقياس الاستثمارات في الشركات التابعة والزميلة والمشاريع المشتركة داخل القوائم المنفصلة.','تمييز القوائم المنفصلة عن القوائم الموحدة ومعالجة الاستثمارات فيها'),
            ('ias_28_investments_associates','IAS 28','الاستثمارات في الشركات الزميلة والمشاريع المشتركة','يعالج IAS 28 طريقة حقوق الملكية عند وجود تأثير مهم أو مشروع مشترك.','قياس أثر الاستثمار عندما لا توجد سيطرة كاملة ولكن يوجد تأثير مهم')]

          cma=[
            ('cma_relevant_costs','CMA','التكاليف الملائمة لاتخاذ القرار','يركز هذا الدرس على التكاليف التي تختلف بين البدائل وتؤثر فعلاً على القرار الإداري.','التركيز على التكاليف المستقبلية المختلفة بين البدائل فقط'),
            ('cma_transfer_pricing','CMA','تسعير التحويل بين الأقسام','يعالج تسعير التحويل كيفية تحديد سعر داخلي عادل عند تبادل السلع أو الخدمات بين مراكز المسؤولية.','اختيار سعر تحويل يحفز الأقسام ويحافظ على مصلحة الشركة ككل'),
            ('cma_variance_investigation','CMA','متى نحقق في الانحرافات؟','يوضح متى يكون الانحراف في التكلفة أو الإيراد مهمًا بما يكفي للتحقيق والمتابعة.','التحقيق في الانحرافات المهمة بدل ملاحقة كل فرق صغير'),
            ('cma_performance_measures','CMA','مقاييس تقييم الأداء','يعرض مقاييس مثل ROI وResidual Income ومؤشرات غير مالية لتقييم مراكز المسؤولية.','استخدام مقاييس متوازنة تمنع الحكم الخاطئ على الأداء'),
            ('cma_working_capital_management','CMA','إدارة رأس المال العامل','يركز على النقد والذمم والمخزون والذمم الدائنة لتحقيق توازن بين السيولة والربحية.','تحقيق توازن عملي بين السيولة والربحية والمخاطر التشغيلية')]

          data['version']=max(int(data.get('version',12))+1,13)
          data['updatedAt']='2026-06-26'
          data['appMessage']='تمت إضافة تحديث جديد: عشرة دروس إضافية مع شروح عملية وأسئلة تدريبية.'
          for tr in data.get('tracks',[]):
              if tr.get('id')=='ifrs':
                  existing={x.get('id') for x in tr.get('lessons',[])}
                  for item in ifrs:
                      if item[0] not in existing:
                          tr.setdefault('lessons',[]).append(lesson(*item))
              if tr.get('id')=='cma':
                  existing={x.get('id') for x in tr.get('lessons',[])}
                  for item in cma:
                      if item[0] not in existing:
                          tr.setdefault('lessons',[]).append(lesson(*item))
          p.write_text(json.dumps(data,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add academy_content.json
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Apply academy content v13"; git pull --rebase origin main; git push origin HEAD:main; fi
