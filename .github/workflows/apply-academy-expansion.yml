name: Apply Academy Expansion

on:
  push:
    branches:
      - academy-expansion
    paths:
      - 'scripts/expand_academy_v21.py'
      - '.github/workflows/apply-academy-expansion.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout expansion branch
        uses: actions/checkout@v4
        with:
          ref: academy-expansion
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply content expansion
        run: python scripts/expand_academy_v21.py

      - name: Validate JSON
        run: python -m json.tool academy_content.json > /dev/null

      - name: Commit expanded content
        run: |
          if git diff --quiet -- academy_content.json; then
            echo 'No content changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add academy_content.json
          git commit -m 'Expand academy with six accounting tracks'
          git push origin academy-expansion
