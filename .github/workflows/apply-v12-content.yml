name: Apply Academy Content V12

on:
  push:
    paths:
      - '.github/workflows/apply-v12-content.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academy-content-update
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply v12 content
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          p=Path('academy_content.json')
          data=json.loads(p.read_text(encoding='utf-8'))

          def qs(title,key):
              stems=['ما الهدف من ','كيف نبدأ تطبيق ','لماذا يعد فهم ','ما أثر الخطأ في ','أي مستند يدعم ','كيف يساعد ','متى نحتاج مراجعة إضافية في ','ما النتيجة العملية من ']
              return [{'q':s+title+'؟','options':[key,'تجاهل التحليل','تسجيل قيد دون دليل','إلغاء الإفصاح'],'answer':0,'explanation':key} for s in stems]

          def lesson(id,code,title,intro,key):
              return {'id':id,'code':code,'standardCode':code,'title':title,'summary':[intro,'يركز على التطبيق العملي داخل الشركات.','يتضمن أسئلة تدريبية تساعد على تثبيت الفكرة.'],'longExplanation':[intro+' هذا الموضوع مهم لأنه يؤثر على جودة التقارير أو القرارات الإدارية بشكل مباشر.','في البداية يجب تحديد طبيعة العملية والجهة المسؤولة عنها والفترة التي تخصها. هذا يمنع الخلط بين المصروف والأصل أو بين الالتزام والإفصاح أو بين القرار القصير والطويل الأجل.','بعد ذلك يتم فحص الأدلة المتاحة، مثل العقود والفواتير والتقارير الداخلية والموازنات وقرارات الإدارة. كلما كانت الأدلة أوضح كانت المعالجة أقوى.','ثم يتم تحليل الأثر المالي أو الإداري. بعض الحالات تؤثر على قائمة الدخل، وبعضها على المركز المالي، وبعضها على التدفقات النقدية أو مؤشرات الأداء.','من الأخطاء الشائعة الاعتماد على قاعدة عامة دون قراءة تفاصيل الحالة. في المحاسبة والإدارة، التفاصيل قد تغير النتيجة بالكامل.','التطبيق الجيد يحتاج أيضًا إلى توثيق سبب القرار، حتى يستطيع المحاسب أو المدير الدفاع عن التحليل عند المراجعة أو النقاش.','هذا الدرس يعطي المستخدم طريقة تفكير منظمة: فهم الحدث، جمع الأدلة، تحديد الأثر، اختيار المعالجة، ثم مراجعة النتيجة.','الخلاصة أن '+title+' يضيف قيمة حقيقية عندما يستخدم لتحسين دقة الأرقام وجودة القرار وليس كحفظ نظري فقط.'],'questions':qs(title,key)}

          ifrs=[
            ('ias_26_retirement_benefit_plans','IAS 26','المحاسبة والتقرير عن خطط منافع التقاعد','يعالج IAS 26 التقارير المالية الخاصة بخطط منافع التقاعد ومعلومات الأصول والالتزامات المرتبطة بها.','عرض معلومات واضحة عن خطة التقاعد ومواردها والتزاماتها'),
            ('ias_29_hyperinflation','IAS 29','التقرير المالي في الاقتصاديات ذات التضخم المرتفع','يعالج IAS 29 إعادة عرض القوائم المالية عندما تعمل المنشأة في اقتصاد عالي التضخم.','إعادة عرض القوائم لتعكس أثر التضخم الكبير'),
            ('ias_34_interim_reporting','IAS 34','التقارير المالية المرحلية','ينظم IAS 34 إعداد تقارير مالية لفترات أقل من سنة مع الحفاظ على معلومات مفيدة ومختصرة.','إعداد تقرير مرحلي متسق ومفيد دون انتظار نهاية السنة'),
            ('ias_40_investment_property','IAS 40','العقارات الاستثمارية','يعالج IAS 40 العقارات المحتفظ بها لتحقيق إيجارات أو ارتفاع في القيمة وليس للاستخدام التشغيلي.','تمييز العقار الاستثماري عن العقار المستخدم في النشاط'),
            ('ifrs_6_mineral_resources','IFRS 6','استكشاف وتقييم الموارد المعدنية','يعالج IFRS 6 سياسات الاعتراف والقياس المتعلقة باستكشاف وتقييم الموارد المعدنية.','فهم تكاليف الاستكشاف والتقييم قبل مرحلة الإنتاج')]
          cma=[
            ('cma_make_or_buy','CMA','قرار التصنيع أو الشراء','يساعد قرار التصنيع أو الشراء على مقارنة التكلفة الملائمة والجودة والطاقة المتاحة والمخاطر.','اختيار البديل الأفضل بناء على التكلفة الملائمة والطاقة والجودة'),
            ('cma_special_order','CMA','قبول الطلبات الخاصة','يركز على تحليل قبول طلب خاص بسعر مختلف مع مراعاة الطاقة الفائضة والتكلفة الإضافية.','قبول الطلب عندما يغطي التكلفة الإضافية ولا يضر بالسوق الأساسي'),
            ('cma_break_even_multi_product','CMA','نقطة التعادل لعدة منتجات','يعالج حساب التعادل عند بيع أكثر من منتج باستخدام مزيج المبيعات وهامش المساهمة المرجح.','تحليل التعادل بناء على مزيج المبيعات لا منتج واحد فقط'),
            ('cma_budgetary_control','CMA','الرقابة بالموازنات','تستخدم الموازنات لمقارنة الأداء الفعلي بالمخطط وتحليل الانحرافات واتخاذ إجراءات تصحيحية.','تحويل الموازنة إلى أداة رقابة وتحسين'),
            ('cma_ethics_accounting','CMA','الأخلاقيات المهنية للمحاسب الإداري','يركز على النزاهة والموضوعية والسرية والكفاءة في عمل المحاسب الإداري.','حماية جودة القرار من خلال النزاهة والموضوعية')]
          data['version']=12
          data['updatedAt']='2026-06-25'
          data['appMessage']='تمت إضافة تحديث رقم 12: عشرة دروس جديدة مع أسئلة تدريبية.'
          for tr in data.get('tracks',[]):
              if tr.get('id')=='ifrs':
                  ex={x.get('id') for x in tr.get('lessons',[])}
                  for it in ifrs:
                      if it[0] not in ex: tr.setdefault('lessons',[]).append(lesson(*it))
              if tr.get('id')=='cma':
                  ex={x.get('id') for x in tr.get('lessons',[])}
                  for it in cma:
                      if it[0] not in ex: tr.setdefault('lessons',[]).append(lesson(*it))
          p.write_text(json.dumps(data,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add academy_content.json
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "Apply academy content v12"; git pull --rebase origin main; git push origin HEAD:main; fi
