name: Apply Academy Content V9

on:
  push:
    paths:
      - '.github/workflows/apply-v9-content.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academy-content-update
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply v9 content
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          p = Path('academy_content.json')
          data = json.loads(p.read_text(encoding='utf-8'))

          def q(text, opts, ans=0, exp=''):
              return {'q': text, 'options': opts, 'answer': ans, 'explanation': exp or 'الإجابة الصحيحة هي الخيار المرتبط بالفكرة العملية للدرس.'}

          def make_lesson(id, code, title, intro, key):
              return {
                'id': id,
                'code': code,
                'standardCode': code,
                'title': title,
                'summary': [
                  intro,
                  'يركز الدرس على التطبيق العملي وليس الحفظ النظري فقط.',
                  'تمت زيادة الشرح والأسئلة لمساعدة المستخدم على الفهم والمراجعة.'
                ],
                'longExplanation': [
                  intro + ' هذا الموضوع مهم لأن أثره لا يظهر في رقم واحد فقط، بل يمتد إلى طريقة قراءة القوائم أو تقييم القرار الإداري.',
                  'عند التطبيق العملي يجب أن يبدأ المحاسب بفهم طبيعة العملية قبل اختيار المعالجة. فالمعيار أو الأداة الإدارية لا تستخدم كقالب جامد، بل كمنهج للتفكير: ما الحدث؟ ما الدليل؟ ما أثره على الأصول والالتزامات والربح والنقد؟',
                  'من الأخطاء الشائعة التعامل مع العنوان فقط دون تحليل الظروف. لذلك يحتاج المحاسب إلى ربط المعلومات بالمستندات، وبالسياسات المعتمدة، وبالأثر المتوقع على المستخدمين. كل افتراض يجب أن يكون واضحًا وقابلًا للتفسير.',
                  'في بيئة العمل، تظهر أهمية هذا الموضوع عند إعداد التقارير الشهرية أو السنوية أو عند مناقشة الإدارة والمدققين. الفهم الجيد يقلل الأخطاء، ويجعل المحاسب قادرًا على شرح سبب المعالجة لا مجرد تسجيل رقم.',
                  'مثال عملي مبسط: إذا ظهرت حالة تتعلق بهذا الموضوع، لا نكتفي بالسؤال عن المبلغ فقط، بل نحدد هل يوجد التزام أو أصل أو مصروف أو إفصاح، وهل الأثر يخص الفترة الحالية أو فترات مستقبلية، وهل توجد معلومات كافية للقياس الموثوق.',
                  'الخلاصة أن ' + title + ' يساعد المحاسب على اتخاذ معالجة أكثر عدالة ووضوحًا، ويزيد جودة التقارير أو القرار الإداري عندما يستخدم بطريقة منظمة.'
                ],
                'questions': [
                  q('ما الفكرة الرئيسية في ' + title + '؟', [key, 'تجاهل أثر العملية بالكامل', 'تسجيل كل شيء كمصروف فورًا', 'الاعتماد على الاسم فقط دون تحليل'], 0, key),
                  q('ما أول خطوة عملية عند التعامل مع هذا الموضوع؟', ['فهم طبيعة العملية والظروف المحيطة بها', 'نسخ قيد سابق دون مراجعة', 'إخفاء العملية من التقرير', 'تغيير اسم الحساب فقط'], 0, 'الفهم قبل التسجيل يمنع المعالجة الخاطئة.'),
                  q('لماذا لا يكفي الحفظ النظري؟', ['لأن التطبيق يعتمد على الظروف والأدلة المتاحة', 'لأن المعايير لا تستخدم أرقامًا', 'لأن القوائم لا تحتاج تحليلًا', 'لأن كل الحالات متطابقة'], 0, 'الحالات العملية تختلف وتحتاج حكمًا مهنيًا.'),
                  q('ما الخطر من المعالجة الخاطئة؟', ['عرض أرقام أو قرارات مضللة', 'زيادة الفهم', 'تحسين الإفصاح دائمًا', 'منع الأخطاء تلقائيًا'], 0, 'الخطأ قد يؤثر على الربح أو الأصول أو الالتزامات أو القرار.'),
                  q('أي عنصر يساعد على دعم المعالجة؟', ['توثيق الافتراضات والمستندات', 'الاعتماد على الذاكرة فقط', 'تجاهل السياسات', 'عدم مراجعة الأثر'], 0, 'التوثيق يجعل القرار قابلًا للمراجعة والدفاع.'),
                  q('ما أفضل نتيجة من فهم هذا الدرس؟', ['تحسين جودة التقرير أو القرار', 'زيادة التعقيد بلا فائدة', 'حذف الإيضاحات', 'إلغاء دور المحاسب'], 0, 'الفهم العملي يجعل المحاسب أكثر قدرة على التحليل والتفسير.')
                ]
              }

          ifrs = [
            ('ias_7_cash_flows_advanced','IAS 7','قائمة التدفقات النقدية - فهم عملي متقدم','يعالج IAS 7 عرض التدفقات النقدية التشغيلية والاستثمارية والتمويلية، ويكشف الفرق بين الربح المحاسبي وحركة النقد الفعلية.','تصنيف التدفقات النقدية وفهم قدرة المنشأة على توليد النقد'),
            ('ias_8_policies_estimates_errors','IAS 8','السياسات المحاسبية والتقديرات والأخطاء','ينظم IAS 8 اختيار السياسات المحاسبية وتغييرها، والتمييز بين التقديرات المحاسبية وتصحيح الأخطاء الجوهرية.','التمييز بين السياسة والتقدير والخطأ ومعالجة كل حالة بشكل صحيح'),
            ('ias_36_impairment_assets','IAS 36','هبوط قيمة الأصول','يعالج IAS 36 اختبار هبوط قيمة الأصول عندما توجد مؤشرات أن القيمة الدفترية قد لا تكون قابلة للاسترداد.','مقارنة القيمة الدفترية بالمبلغ القابل للاسترداد والاعتراف بخسارة الهبوط عند الحاجة'),
            ('ifrs_8_operating_segments','IFRS 8','القطاعات التشغيلية','يعالج IFRS 8 الإفصاح عن القطاعات التشغيلية وفق منظور الإدارة ومصادر الربح والمخاطر داخل المنشأة.','عرض أداء القطاعات كما تتابعه الإدارة لتوضيح مصادر الربح والمخاطر'),
            ('ifrs_16_leases_lessee_practice','IFRS 16','عقود الإيجار من منظور المستأجر','يعالج IFRS 16 اعتراف المستأجر بأصل حق استخدام والتزام إيجار لمعظم عقود الإيجار.','إظهار حق الاستخدام والتزام الإيجار بدل إخفاء الالتزامات خارج الميزانية')
          ]
          cma = [
            ('cma_transfer_pricing','CMA','تسعير التحويل بين الأقسام','يتناول تسعير التحويل تحديد السعر الداخلي بين أقسام الشركة بما يؤثر على تقييم الأداء والقرارات.','تحديد سعر داخلي عادل يخدم أداء الأقسام ومصلحة الشركة ككل'),
            ('cma_responsibility_accounting','CMA','محاسبة المسؤولية ومراكز الأداء','تركز محاسبة المسؤولية على تقييم المديرين حسب ما يمكنهم التحكم به من تكاليف أو إيرادات أو أصول.','ربط التقييم بنطاق السيطرة والمسؤولية الفعلية للمدير'),
            ('cma_quality_costs','CMA','تكاليف الجودة','تقسم تكاليف الجودة إلى وقاية وتقييم وفشل داخلي وفشل خارجي لقياس أثر الجودة ماليًا.','فهم تكلفة منع الأخطاء واكتشافها وفشلها داخليًا أو عند العميل'),
            ('cma_activity_based_costing','CMA','التكلفة على أساس النشاط ABC','يربط نظام ABC التكاليف غير المباشرة بالأنشطة ومسببات التكلفة بدل التوزيع التقليدي العام.','تخصيص التكاليف حسب الأنشطة التي تستهلك الموارد فعليًا'),
            ('cma_relevant_costs_decisions','CMA','التكاليف الملائمة لاتخاذ القرار','تركز التكاليف الملائمة على الإيرادات والتكاليف المستقبلية التي تختلف بين البدائل وتستبعد التكاليف الغارقة.','التركيز على الأرقام المستقبلية المختلفة بين البدائل لا الأرقام التاريخية')
          ]

          data['version'] = 9
          data['updatedAt'] = '2026-06-25'
          data['appMessage'] = 'تمت إضافة تحديث رقم 9: عشرة دروس جديدة بشرح أطول وستة أسئلة لكل درس.'

          for track in data.get('tracks', []):
              if track.get('id') == 'ifrs':
                  existing = {x.get('id') for x in track.get('lessons', [])}
                  for item in ifrs:
                      if item[0] not in existing:
                          track.setdefault('lessons', []).append(make_lesson(*item))
              if track.get('id') == 'cma':
                  existing = {x.get('id') for x in track.get('lessons', [])}
                  for item in cma:
                      if item[0] not in existing:
                          track.setdefault('lessons', []).append(make_lesson(*item))

          p.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add academy_content.json
          if git diff --cached --quiet; then
            echo "No content changes"
          else
            git commit -m "Apply academy content v9"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
