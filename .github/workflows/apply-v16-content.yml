name: Apply Academy Content V16

on:
  push:
    paths:
      - '.github/workflows/apply-v16-content.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academy-content-update
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply v16 content
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          p=Path('academy_content.json')
          data=json.loads(p.read_text(encoding='utf-8'))

          def qs(title,key):
              stems=[
                'ما الهدف العملي من ',
                'ما أول خطوة صحيحة عند تطبيق ',
                'لماذا يحتاج المحاسب إلى فهم ',
                'أي دليل يساعد أكثر في معالجة ',
                'ما أثر سوء تطبيق ',
                'متى تصبح المراجعة المهنية مهمة في ',
                'كيف يدعم هذا الموضوع جودة القرار في ',
                'ما الخلاصة التطبيقية من '
              ]
              distractors=['تجاهل المستندات','تسجيل كل شيء كمصروف مباشرة','إلغاء التحليل والاكتفاء بالحفظ']
              return [{'q':s+title+'؟','options':[key]+distractors,'answer':0,'explanation':key} for s in stems]

          def lesson(id,code,title,intro,key):
              return {
                'id':id,
                'code':code,
                'standardCode':code,
                'title':title,
                'summary':[intro,'يربط الدرس بين النص المحاسبي أو الإداري والتطبيق العملي داخل المنشأة.','توجد أسئلة تدريبية تساعد على تثبيت الفكرة واختبار الفهم.'],
                'longExplanation':[
                  intro+' لا تكفي معرفة اسم الموضوع فقط، بل يجب فهم أثره على القياس والعرض والإفصاح أو القرار الإداري.',
                  'يبدأ التطبيق الصحيح بتحديد طبيعة العملية: هل هي أصل، التزام، دخل، مصروف، إفصاح، أو قرار إداري؟ هذا التصنيف الأولي يمنع كثيرًا من الأخطاء.',
                  'بعد ذلك يجب جمع الأدلة المناسبة مثل العقود، الفواتير، قرارات الإدارة، سياسات الشركة، تقارير التشغيل، والموازنات. قوة الدليل تؤثر مباشرة على قوة المعالجة.',
                  'ثم يتم تحليل الأثر المالي أو الإداري. بعض الحالات تؤثر في قائمة الدخل، وبعضها في قائمة المركز المالي، وبعضها في التدفقات النقدية أو مؤشرات الأداء.',
                  'من الأخطاء الشائعة تطبيق قاعدة عامة دون النظر إلى تفاصيل الحالة. قد يؤدي ذلك إلى اعتراف مبكر أو متأخر، قياس غير دقيق، أو قرار إداري غير مناسب.',
                  'التوثيق جزء أساسي من العمل المهني. يجب أن يعرف المحاسب أو المدير لماذا اختار هذه المعالجة أو هذا القرار، وما البدائل التي تم استبعادها.',
                  'عند وجود تقديرات أو أحكام مهنية، يجب مراجعة الافتراضات بانتظام، لأن تغير الظروف قد يغير النتيجة المحاسبية أو الإدارية.',
                  'الخلاصة أن '+title+' ليس معلومة نظرية فقط، بل أداة لتحسين جودة التقارير والقرارات وتقليل الأخطاء عند التطبيق.'
                ],
                'questions':qs(title,key)
              }

          ifrs=[
            ('ifrs_2_share_based_payment','IFRS 2','الدفع على أساس الأسهم','يعالج IFRS 2 المعاملات التي تمنح فيها المنشأة أسهمًا أو خيارات أسهم للموظفين أو الموردين مقابل خدمات أو سلع.','قياس تكلفة الخدمات أو السلع المستلمة مقابل أدوات حقوق الملكية أو مبالغ مرتبطة بها'),
            ('ifrs_4_insurance_contracts_legacy','IFRS 4','عقود التأمين - الإطار السابق','يعالج IFRS 4 الإطار السابق لعقود التأمين قبل التطبيق الكامل لـ IFRS 17، ويفيد في فهم الانتقال بين المعيارين.','فهم المعالجة السابقة لعقود التأمين والتمييز بينها وبين متطلبات IFRS 17'),
            ('ifrs_5_assets_held_for_sale','IFRS 5','الأصول غير المتداولة المحتفظ بها للبيع والعمليات غير المستمرة','يعالج IFRS 5 تصنيف وقياس الأصول أو المجموعات التي تنوي المنشأة بيعها، وكذلك عرض العمليات غير المستمرة.','تصنيف الأصل كمحتفظ به للبيع عندما يكون البيع مرجحًا وجاهزًا وفق شروط محددة'),
            ('ias_12_income_taxes','IAS 12','ضرائب الدخل','يعالج IAS 12 الضريبة الحالية والمؤجلة الناتجة عن الفروق بين الأساس المحاسبي والضريبي للأصول والالتزامات.','تمييز الضريبة الحالية عن الضريبة المؤجلة الناتجة عن الفروق المؤقتة'),
            ('ias_19_employee_benefits','IAS 19','منافع الموظفين','يعالج IAS 19 الرواتب والمكافآت ومنافع نهاية الخدمة وخطط التقاعد وغيرها من منافع الموظفين.','الاعتراف بمنافع الموظفين عند تقديم الخدمة وقياس الالتزامات المرتبطة بها')
          ]
          cma=[
            ('cma_cash_conversion_cycle','CMA','دورة التحويل النقدي','تقيس دورة التحويل النقدي مدة تحول الاستثمار في المخزون والذمم إلى نقد بعد سداد الموردين.','تقليل مدة تجميد النقد دون الإضرار بالمبيعات أو علاقة الموردين'),
            ('cma_inventory_management','CMA','إدارة المخزون وكمية الطلب الاقتصادية','تركز إدارة المخزون على الموازنة بين تكلفة الطلب وتكلفة الاحتفاظ ومخاطر نفاد المخزون.','تحديد كمية طلب تحقق توازنًا بين تكلفة الطلب وتكلفة التخزين'),
            ('cma_credit_policy','CMA','سياسة الائتمان والتحصيل','تساعد سياسة الائتمان على إدارة المبيعات الآجلة والمخاطر المرتبطة بالتحصيل والديون المشكوك فيها.','تحقيق توازن بين زيادة المبيعات وتقليل مخاطر عدم التحصيل'),
            ('cma_short_term_financing','CMA','التمويل قصير الأجل','يعالج اختيار مصادر التمويل قصيرة الأجل مثل الموردين، التسهيلات البنكية، والائتمان التجاري.','اختيار مصدر تمويل قصير الأجل بأقل تكلفة ومخاطر مناسبة'),
            ('cma_process_costing','CMA','تكاليف المراحل الإنتاجية','تستخدم تكاليف المراحل عندما تمر المنتجات المتشابهة بمراحل إنتاج متتابعة ويتم حساب تكلفة الوحدة المكافئة.','حساب تكلفة الوحدة في الإنتاج المستمر باستخدام وحدات مكافئة')
          ]

          data['version']=16
          data['updatedAt']='2026-06-26'
          data['appMessage']='تمت إضافة تحديث رقم 16: عشرة دروس جديدة مع أسئلة تدريبية.'
          for tr in data.get('tracks',[]):
              if tr.get('id')=='ifrs':
                  ex={x.get('id') for x in tr.get('lessons',[])}
                  for it in ifrs:
                      if it[0] not in ex:
                          tr.setdefault('lessons',[]).append(lesson(*it))
              if tr.get('id')=='cma':
                  ex={x.get('id') for x in tr.get('lessons',[])}
                  for it in cma:
                      if it[0] not in ex:
                          tr.setdefault('lessons',[]).append(lesson(*it))
          p.write_text(json.dumps(data,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add academy_content.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Apply academy content v16"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
