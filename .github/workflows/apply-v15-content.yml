name: Apply Academy Content V15

on:
  push:
    paths:
      - '.github/workflows/apply-v15-content.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: academy-content-update
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply v15 content
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          p=Path('academy_content.json')
          data=json.loads(p.read_text(encoding='utf-8'))

          def qs(title, key):
              items = [
                ('ما الهدف العملي من '+title+'؟', key, ['حفظ الاسم فقط','تجاهل المستندات','إلغاء التحليل']),
                ('ما أول خطوة عند تطبيق '+title+'؟', 'فهم طبيعة العملية وجمع الأدلة', ['تسجيل رقم عشوائي','تأجيل القيد دائمًا','حذف الإفصاح']),
                ('لماذا يعد '+title+' مهمًا؟', 'لأنه يحسن دقة التقارير أو القرار الإداري', ['لأنه يقلل الحاجة للفهم','لأنه يمنع المراجعة','لأنه يلغي القيود']),
                ('ما الخطر الشائع في '+title+'؟', 'تطبيق قاعدة عامة دون تحليل تفاصيل الحالة', ['زيادة التوثيق','قراءة العقد','مراجعة الأرقام']),
                ('أي دليل يدعم تطبيق '+title+'؟', 'العقود والفواتير والتقارير وقرارات الإدارة', ['لون الشاشة','اسم المستخدم','ترتيب الأيقونات']),
                ('كيف يساعد '+title+' الإدارة؟', 'يوفر معلومات أوضح لاتخاذ قرار أفضل', ['يزيد الغموض','يلغي الحاجة للرقابة','يمنع المقارنة']),
                ('متى نحتاج مراجعة إضافية في '+title+'؟', 'عند وجود تقديرات أو شروط أو آثار جوهرية', ['عند وضوح كل شيء فقط','عند عدم وجود أرقام','عند غياب العملية']),
                ('ما النتيجة الجيدة من '+title+'؟', 'معالجة موثقة ومنطقية قابلة للمراجعة', ['قرار غير موثق','إفصاح ناقص','خلط بين البنود'])
              ]
              out=[]
              for q, ans, wrong in items:
                  opts=[ans]+wrong
                  out.append({'q':q,'options':opts,'answer':0,'explanation':ans})
              return out

          def lesson(id, code, title, intro, key):
              return {
                'id': id,
                'code': code,
                'standardCode': code,
                'title': title,
                'summary': [intro, 'يركز الدرس على الفهم العملي وليس الحفظ فقط.', 'يتضمن أمثلة تفكير وأسئلة تدريبية لتثبيت المفهوم.'],
                'longExplanation': [
                  intro,
                  'في التطبيق العملي يبدأ المحاسب أو المحلل بتحديد طبيعة العملية: هل هي أصل، التزام، إيراد، مصروف، إفصاح، أم قرار إداري؟ هذا التصنيف الأولي يمنع كثيرًا من الأخطاء اللاحقة.',
                  'بعد ذلك يجب جمع الأدلة المناسبة مثل العقد، الفاتورة، سياسة الشركة، تقرير الإدارة، بيانات السوق، أو تفاصيل الموازنة. جودة الدليل تؤثر مباشرة على قوة المعالجة.',
                  'الخطوة التالية هي قياس الأثر المالي أو الإداري. قد يظهر الأثر في الربح أو الخسارة، المركز المالي، التدفقات النقدية، نسب الأداء، أو قرارات التسعير والاستثمار.',
                  'من المهم عدم الاكتفاء بعنوان المعيار أو المصطلح. كثير من الحالات تتغير نتيجتها بسبب شرط صغير في العقد أو بسبب اختلاف الغرض من الاحتفاظ بالأصل أو بسبب وجود قيود على استخدام المورد.',
                  'في بيئة العمل يجب توثيق سبب اختيار المعالجة، لأن الرقم وحده لا يكفي. التوثيق الجيد يساعد عند المراجعة، وعند شرح القرار للإدارة، وعند مقارنة النتائج بين الفترات.',
                  'كما يجب ربط التحليل بالأثر على المستخدم النهائي للمعلومة. المستثمر يهتم بالمخاطر والعائد، الإدارة تهتم بالقرار، والمدقق يهتم بالدليل والاتساق، والجهات الرقابية تهتم بالإفصاح والالتزام.',
                  'الخلاصة أن '+title+' ليس موضوعًا نظريًا فقط، بل أداة لتحسين جودة التقارير المالية والقرارات الإدارية عندما يطبق بطريقة منظمة ومدعومة بالأدلة.'
                ],
                'questions': qs(title, key)
              }

          ifrs = [
            ('ias_7_cash_flows_advanced','IAS 7','قائمة التدفقات النقدية - تطبيقات متقدمة','يعالج IAS 7 عرض التدفقات النقدية من الأنشطة التشغيلية والاستثمارية والتمويلية مع التركيز على جودة النقد وليس الربح فقط.','تصنيف التدفقات النقدية بشكل صحيح لفهم قدرة المنشأة على توليد النقد'),
            ('ias_8_policies_estimates_errors','IAS 8','السياسات المحاسبية والتقديرات والأخطاء','يوضح IAS 8 كيفية اختيار السياسات المحاسبية وتغيير التقديرات وتصحيح الأخطاء الجوهرية.','التمييز بين تغيير السياسة وتغيير التقدير وتصحيح الخطأ'),
            ('ias_10_events_after_reporting','IAS 10','الأحداث بعد فترة التقرير','يعالج IAS 10 الأحداث التي تقع بعد تاريخ القوائم وقبل اعتمادها للإصدار، وهل تتطلب تعديلًا أو إفصاحًا فقط.','تحديد هل الحدث اللاحق معدل للقوائم أو يحتاج إفصاحًا'),
            ('ias_32_financial_instruments_presentation','IAS 32','عرض الأدوات المالية','يركز IAS 32 على عرض الأدوات المالية كالتزامات أو حقوق ملكية وعلى قواعد المقاصة بين الأصول والالتزامات المالية.','تصنيف الأداة المالية بين التزام وحقوق ملكية حسب جوهرها'),
            ('ifrs_7_financial_instruments_disclosures','IFRS 7','إفصاحات الأدوات المالية','يتطلب IFRS 7 إفصاحات تساعد المستخدمين على فهم مخاطر الأدوات المالية مثل الائتمان والسيولة والسوق.','الإفصاح عن طبيعة ومخاطر الأدوات المالية وأثرها')
          ]
          cma = [
            ('cma_activity_based_costing','CMA','التكلفة على أساس النشاط ABC','يعالج ABC تحميل التكاليف غير المباشرة بناءً على محركات تكلفة أكثر عدالة من التحميل التقليدي.','ربط التكاليف بالأنشطة ومحركات التكلفة لتحسين دقة تكلفة المنتج'),
            ('cma_balanced_scorecard','CMA','بطاقة الأداء المتوازن','تربط بطاقة الأداء المتوازن بين مؤشرات مالية وغير مالية مثل العملاء والعمليات والتعلم والنمو.','تقييم الأداء من عدة زوايا وليس من الربح فقط'),
            ('cma_transfer_pricing_advanced','CMA','تسعير التحويل - تطبيقات متقدمة','يساعد تسعير التحويل على تقييم أداء الوحدات الداخلية عندما تتبادل السلع أو الخدمات داخل نفس المجموعة.','اختيار سعر تحويل عادل يدعم القرار وتقييم الأداء'),
            ('cma_capacity_management','CMA','إدارة الطاقة الإنتاجية','تركز إدارة الطاقة على فهم الطاقة المتاحة والمستخدمة والعاطلة وأثرها على التكلفة والقرارات.','تحليل الطاقة لتجنب تحميل التكاليف أو قبول قرارات غير مناسبة'),
            ('cma_risk_response','CMA','الاستجابة للمخاطر','يعالج كيفية اختيار الاستجابة المناسبة للمخاطر بين التجنب أو التخفيض أو النقل أو القبول.','اختيار استجابة مناسبة حسب احتمال الخطر وأثره وتكلفة السيطرة')
          ]

          data['version'] = 15
          data['updatedAt'] = '2026-06-26'
          data['appMessage'] = 'تمت إضافة تحديث رقم 15: عشرة دروس جديدة مع أسئلة تدريبية.'
          for tr in data.get('tracks', []):
              if tr.get('id') == 'ifrs':
                  existing = {x.get('id') for x in tr.get('lessons', [])}
                  for item in ifrs:
                      if item[0] not in existing:
                          tr.setdefault('lessons', []).append(lesson(*item))
              if tr.get('id') == 'cma':
                  existing = {x.get('id') for x in tr.get('lessons', [])}
                  for item in cma:
                      if item[0] not in existing:
                          tr.setdefault('lessons', []).append(lesson(*item))
          p.write_text(json.dumps(data, ensure_ascii=False, indent=2)+'\n', encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add academy_content.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Apply academy content v15"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
